version: '3.8'

services:
  app:
    build: .
    container_name: be-booking-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/be-booking
    depends_on:
      - mongodb
    restart: always

  mongodb:
    image: mongo:latest
    container_name: be-booking-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  mongodb_data:
